<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>吐き出し場所</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#09090e;font-family:'Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;min-height:100vh}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes blink{0%,100%{opacity:.2}50%{opacity:.9}}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(120,80,200,.3);border-radius:2px}

/* Splash */
#splash{min-height:100vh;display:flex;align-items:center;justify-content:center;font-family:‘Hiragino Mincho ProN’,Georgia,serif;background:#09090e}
.orb{width:140px;height:140px;border-radius:50%;background:radial-gradient(circle at 40% 35%,#6030b099 0%,#1a0a30 60%,transparent 100%);margin:0 auto 32px;box-shadow:0 0 60px 15px #6030b033;animation:pulse 4s ease-in-out infinite}
.splash-title{color:#e8e0f0;font-size:22px;font-weight:300;letter-spacing:.08em;margin-bottom:14px;line-height:1.7;text-align:center}
.splash-sub{color:#7a6a98;font-size:14px;line-height:2;margin-bottom:10px;font-weight:300;text-align:center}
.splash-note{color:#4a3a60;font-size:12px;margin-bottom:36px;text-align:center}
.start-btn{background:transparent;border:1px solid #6030b080;color:#6030b0ee;font-size:16px;padding:12px 48px;border-radius:40px;cursor:pointer;letter-spacing:.2em;font-family:inherit;display:block;margin:0 auto}

/* Name */
#namescreen{min-height:100vh;display:none;align-items:center;justify-content:center;background:#09090e;font-family:‘Hiragino Mincho ProN’,Georgia,serif}
.name-title{color:#9a8ab8;font-size:18px;margin-bottom:10px;font-weight:300;text-align:center}
.name-sub{color:#4a3a60;font-size:13px;margin-bottom:28px;text-align:center}
#nameInput{background:rgba(255,255,255,.05);border:1px solid #6030b044;border-radius:12px;color:#d0c0e8;font-size:18px;padding:12px 20px;outline:none;width:200px;font-family:inherit;caret-color:#8060d0;display:block;margin:0 auto 16px;text-align:center}
.name-btns{display:flex;gap:12px;justify-content:center}
.name-btn{background:transparent;border:1px solid #6030b080;color:#6030b0ee;font-size:15px;padding:11px 32px;border-radius:40px;cursor:pointer;font-family:inherit}
.name-skip{background:transparent;border:1px solid rgba(255,255,255,.1);color:#5a4a78;font-size:13px;padding:11px 20px;border-radius:40px;cursor:pointer;font-family:inherit}

/* Chat */
#chat{min-height:100vh;max-width:520px;margin:0 auto;display:none;flex-direction:column;background:#09090e}
.header{padding:14px 18px 10px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,.05)}
.header-left{display:flex;align-items:center;gap:8px}
.dot{width:7px;height:7px;border-radius:50%;background:#6030b0;box-shadow:0 0 8px #6030b0;display:inline-block}
.header-text{color:#5a4a78;font-size:12px}
.mode-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#8a7aaa;font-size:12px;padding:5px 10px;border-radius:20px;cursor:pointer}
#feed{flex:1;overflow-y:auto;padding:18px 16px 8px;display:flex;flex-direction:column;gap:10px}
.empty{text-align:center;margin-top:70px;color:#3a2a58;font-size:15px;line-height:2.2;font-weight:300;white-space:pre-line}
.bubble-wrap-user{display:flex;justify-content:flex-end}
.bubble-wrap-ai{display:flex;justify-content:flex-start}
.bubble-user{padding:11px 15px;max-width:78%;font-size:15px;line-height:1.8;background:linear-gradient(135deg,#6030b088,#6030b044);color:#ddd0f8;border-radius:18px 18px 4px 18px;border:1px solid #6030b044}
.bubble-ai{padding:11px 15px;max-width:78%;font-size:15px;line-height:1.8;background:rgba(255,255,255,.04);color:#a898c0;border-radius:18px 18px 18px 4px;border:1px solid rgba(255,255,255,.06)}
.typing{padding:14px 18px;background:rgba(255,255,255,.04);border-radius:18px 18px 18px 4px;border:1px solid rgba(255,255,255,.06);font-size:20px;letter-spacing:4px;color:#a898c0}
.typing span:nth-child(1){animation:blink 1.2s 0s infinite}
.typing span:nth-child(2){animation:blink 1.2s .3s infinite}
.typing span:nth-child(3){animation:blink 1.2s .6s infinite}
.presets{display:flex;flex-wrap:wrap;gap:6px;padding:8px 14px;border-top:1px solid rgba(255,255,255,.04)}
.preset-btn{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);color:#8070a8;font-size:12px;padding:6px 12px;border-radius:20px;cursor:pointer;white-space:nowrap}
.input-area{padding:10px 14px 20px;display:flex;gap:8px;align-items:flex-end;border-top:1px solid rgba(255,255,255,.05);background:rgba(8,6,18,.9)}
#msgInput{flex:1;background:rgba(255,255,255,.04);border:1px solid #6030b033;border-radius:13px;color:#ccc0e0;font-size:15px;padding:11px 13px;resize:none;outline:none;font-family:inherit;line-height:1.6;caret-color:#8060d0}
#msgInput::placeholder{color:#3a2a58}
.input-btns{display:flex;flex-direction:column;gap:6px}
.clear-btn{width:40px;height:40px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);cursor:pointer;font-size:16px}
.send-btn{width:40px;height:40px;border-radius:50%;background:#6030b0;border:none;color:#fff;font-size:17px;cursor:pointer}
.send-btn:disabled{opacity:.4;cursor:not-allowed}
</style>

</head>
<body>

<!-- Splash -->

<div id="splash">
  <div style="text-align:center;padding:40px 24px">
    <div class="orb"></div>
    <h1 class="splash-title">ここは、ただ吐き出す場所。</h1>
    <p class="splash-sub">何を言っても否定しない。<br>ただ、受け止めるだけ。</p>
    <p class="splash-note">この会話は保存されません</p>
    <button class="start-btn" onclick="goName()">話す</button>
  </div>
</div>

<!-- Name -->

<div id="namescreen">
  <div style="text-align:center;padding:40px 24px">
    <p class="name-title">なんて呼べばいい？</p>
    <p class="name-sub">あだ名でもなんでもいいよ</p>
    <input id="nameInput" placeholder="なまえ" onkeydown="if(event.key==='Enter')startChat()">
    <div class="name-btns">
      <button class="name-btn" onclick="startChat()">はじめる</button>
      <button class="name-skip" onclick="startChat(true)">名前なしでいい</button>
    </div>
  </div>
</div>

<!-- Chat -->

<div id="chat">
  <div class="header">
    <div class="header-left">
      <span class="dot"></span>
      <span class="header-text" id="headerText">吐き出し場所</span>
    </div>
    <button class="mode-btn" id="modeBtn" onclick="toggleMode()">💬 共感</button>
  </div>
  <div id="feed"></div>
  <div class="presets">
    <button class="preset-btn" onclick="sendPreset('😤 イライラしてる','イライラしてる')">😤 イライラしてる</button>
    <button class="preset-btn" onclick="sendPreset('😢 悲しい','悲しい')">😢 悲しい</button>
    <button class="preset-btn" onclick="sendPreset('😮‍💨 疲れた','疲れた')">😮‍💨 疲れた</button>
    <button class="preset-btn" onclick="sendPreset('🌫️ 消えたい','消えたい')">🌫️ 消えたい</button>
    <button class="preset-btn" onclick="sendPreset('🤐 誰にも言えない','誰にも言えない')">🤐 誰にも言えない</button>
    <button class="preset-btn" onclick="sendPreset('💢 もう限界','もう限界')">💢 もう限界</button>
  </div>
  <div class="input-area">
    <textarea id="msgInput" rows="2" placeholder="ここに吐き出して…（Enterで送信）" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendMsg()}"></textarea>
    <div class="input-btns">
      <button class="clear-btn" onclick="clearChat()">🌊</button>
      <button class="send-btn" id="sendBtn" onclick="sendMsg()">↑</button>
    </div>
  </div>
</div>

<script>
const ANTHROPIC_API_KEY = 'YOUR_API_KEY_HERE';
let userName = '';
let listenMode = false;
let lastReply = '';
let history = [];

const STRONG_WORDS = ['死にたい','消えたい','もう限界','限界','終わりにしたい','いなくなりたい'];
const isStrong = t => STRONG_WORDS.some(w => t.includes(w));

function goName(){
  document.getElementById('splash').style.display='none';
  const ns = document.getElementById('namescreen');
  ns.style.display='flex';
  setTimeout(()=>document.getElementById('nameInput').focus(),100);
}

function startChat(skip){
  userName = skip ? '' : (document.getElementById('nameInput').value.trim());
  document.getElementById('namescreen').style.display='none';
  const chat = document.getElementById('chat');
  chat.style.display='flex';
  chat.style.flexDirection='column';
  document.getElementById('headerText').textContent = userName ? `${userName}の吐き出し場所` : '吐き出し場所';
  const empty = document.createElement('p');
  empty.className='empty';
  empty.textContent = userName ? `${userName}、今日何かあった？\n吐き出していいよ。` : '今日、何かあった？\n吐き出していいよ。';
  document.getElementById('feed').appendChild(empty);
}

function toggleMode(){
  listenMode = !listenMode;
  document.getElementById('modeBtn').textContent = listenMode ? '🤫 聞くだけ' : '💬 共感';
}

function clearChat(){
  history=[];lastReply='';
  const feed = document.getElementById('feed');
  feed.innerHTML='';
  const empty = document.createElement('p');
  empty.className='empty';
  empty.textContent = userName ? `${userName}、今日何かあった？\n吐き出していいよ。` : '今日、何かあった？\n吐き出していいよ。';
  feed.appendChild(empty);
}

function addBubble(text, role){
  const feed = document.getElementById('feed');
  // 空メッセージ削除
  const empty = feed.querySelector('.empty');
  if(empty) empty.remove();
  const wrap = document.createElement('div');
  wrap.className = role==='user' ? 'bubble-wrap-user' : 'bubble-wrap-ai';
  const bubble = document.createElement('div');
  bubble.className = role==='user' ? 'bubble-user' : 'bubble-ai';
  bubble.textContent = text;
  wrap.appendChild(bubble);
  feed.appendChild(wrap);
  feed.scrollTop = feed.scrollHeight;
}

function showTyping(){
  const feed = document.getElementById('feed');
  const wrap = document.createElement('div');
  wrap.className='bubble-wrap-ai';
  wrap.id='typing';
  wrap.innerHTML='<div class="typing"><span>·</span><span>·</span><span>·</span></div>';
  feed.appendChild(wrap);
  feed.scrollTop=feed.scrollHeight;
}

function hideTyping(){
  const t = document.getElementById('typing');
  if(t) t.remove();
}

function buildPrompt(userText){
  const nameNote = userName ? `ユーザーの名前は「${userName}」。3〜4回に1回だけ自然に名前を呼ぶ。` : '';
  const avoidNote = lastReply ? `【絶対禁止】直前の返答「${lastReply}」と全く同じ表現・同じ書き出しを使うな。違う角度から返せ。` : '';
  const strong = isStrong(userText);
  const strongRule = strong ? `
【最重要】強い感情ワードを含む。
- 「聞いてるよ」「受け取ってる」「大丈夫」系は完全禁止
- ユーザーの言葉を拾って「理解してる感」を出す
- 例：「旦那が浮気してる」→「旦那に浮気されて、そこまで追い詰められたんだね」
- 使う言葉：「そこまで追い込まれてるんだね」「それだけ一人で抱えてきたんだね」「ちゃんとわかるよ」` 
  : `
- ユーザーの言葉を必ず少し拾って返す
- 「聞いてるよ」は軽い場面のみOK`;
  const listenNote = listenMode ? '返答は1文のみ。' : '返答は1〜3文。毎回長さを変える。';

  return `あなたは「ただ受け止める存在」です。

絶対ルール：否定しない、アドバイスしない、解決しようとしない。「でも」「ただし」「前向きに」「なんとかなる」は絶対使わない。

${nameNote}
${strongRule}
${avoidNote}
${listenNote}
返答は日本語で。`;
}

async function callAI(userText){
  const res = await fetch('https://api.anthropic.com/v1/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json','x-api-key':ANTHROPIC_API_KEY,'anthropic-version':'2023-06-01'},
    body:JSON.stringify({
      model:'claude-opus-4-5',
      max_tokens:300,
      system:buildPrompt(userText),
      messages:history
    })
  });
  const data = await res.json();
  return data.content?.map(b=>b.text||'').join('')||'それはしんどかったね。';
}

async function sendPreset(display, key){
  addBubble(display,'user');
  history.push({role:'user',content:display});
  showTyping();
  document.getElementById('sendBtn').disabled=true;
  await new Promise(r=>setTimeout(r,800+Math.random()*1200));
  hideTyping();
  const reply = await callAI(key).catch(()=>'それはしんどかったね。');
  addBubble(reply,'assistant');
  history.push({role:'assistant',content:reply});
  lastReply=reply;
  document.getElementById('sendBtn').disabled=false;
}

async function sendMsg(){
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if(!text) return;
  input.value='';
  addBubble(text,'user');
  history.push({role:'user',content:text});
  showTyping();
  document.getElementById('sendBtn').disabled=true;
  await new Promise(r=>setTimeout(r,800+Math.random()*1200));
  hideTyping();
  const reply = await callAI(text).catch(()=>'それはしんどかったね。');
  addBubble(reply,'assistant');
  history.push({role:'assistant',content:reply});
  lastReply=reply;
  document.getElementById('sendBtn').disabled=false;
}
</script>

</body>
</html>
